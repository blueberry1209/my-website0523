<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <h1 class="logo" aria-label="Google">Google</h1>

    <div class="search-bar" role="search">
      <button type="button" class="icon-btn" aria-label="추가">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <input
        type="search"
        class="search-input"
        placeholder="Google에 물어보기"
        aria-label="검색"
        autocomplete="off"
      />

      <div class="search-actions">
        <button type="button" class="icon-btn" aria-label="음성 검색">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>

        <button type="button" class="icon-btn" aria-label="이미지로 검색">
          <svg class="icon lens-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="1.5" d="M7 8.5h10v7H7z" rx="1"/>
            <circle cx="12" cy="12" r="2.25" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="15.5" cy="9.5" r="0.75" fill="currentColor"/>
          </svg>
        </button>

        <button type="button" class="ai-mode-btn">
          <svg class="icon ai-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15zm0-2a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11z"/>
            <path fill="currentColor" d="M16.2 16.2l3.1 3.1-1.4 1.4-3.1-3.1 1.4-1.4z"/>
            <path fill="currentColor" d="M15 4l.8 1.6L17.4 6l-1.6.8L15 8.4l-.8-1.6L12.6 6l1.6-.8L15 4zm4 2l.5 1 1 .5-1 .5-.5 1-.5-1-1-.5 1-.5.5-1z"/>
          </svg>
          <span>AI 모드</span>
        </button>
      </div>
    </div>
  </main>
</body>
</html>
